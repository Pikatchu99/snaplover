name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".dockerignore"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR exige un nom d'image en minuscules — github.repository/github.actor
      # gardent la casse réelle du compte (ex. "Pikatchu99"), d'où ce calcul.
      - name: Compute image tag + name (git SHA — traçable, jamais "latest" seul)
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/web" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # NEXT_PUBLIC_* : figées dans le bundle client au build (voir
      # web/Dockerfile). Non sensibles par nature (elles finissent de toute
      # façon dans le bundle client), mais stockées ici en Secrets plutôt
      # qu'en Variables — les deux fonctionnent, Secrets fait doublon avec
      # rien d'autre dans ce repo. Les vraies valeurs server-only
      # (STUN_URLS, TURN_*) ne sont PAS ici : runtime-only, elles vivent
      # uniquement dans ~/snaplover/web.env sur le VPS.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SIGNALING_URL=${{ secrets.NEXT_PUBLIC_SIGNALING_URL }}
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (pull + restart)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.VPS_DEPLOY_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ~/snaplover
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export WEB_IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose pull web
            docker compose up -d web
            docker image prune -f
